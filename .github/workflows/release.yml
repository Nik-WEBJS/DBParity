name: Release to PyPI

# Publishes on a vX.Y.Z tag. Requires a one-time Trusted Publisher
# setup on pypi.org (see ROADMAP.md, "How to release" section).
on:
  push:
    tags: ["v*"]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
