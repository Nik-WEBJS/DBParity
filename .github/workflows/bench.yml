name: Benchmark

# Benchmark matrix against performance regressions (roadmap v0.3).
# The thresholds are a conservative floor for CI runners (~2x below local
# figures): GitHub runners are slower and noisier than a local machine.

on:
  pull_request:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .

      - name: Benchmark (200K rows per side)
        run: python3 bench/bench.py 200000 --json bench.json

      - name: Regression check
        run: |
          python3 - <<'PY'
          import json
          import sys

          data = json.load(open("bench.json", encoding="utf-8"))

          FASTPATH_MIN = 150_000   # rows/s
          GENERIC_MIN = 100_000    # rows/s

          errors = []
          if data["fastpath_rows_per_s"] < FASTPATH_MIN:
              errors.append(f"fast-path: {data['fastpath_rows_per_s']} < {FASTPATH_MIN} rows/s")
          if data["generic_rows_per_s"] < GENERIC_MIN:
              errors.append(f"generic: {data['generic_rows_per_s']} < {GENERIC_MIN} rows/s")
          if data["diffs_ok"] is not True:
              errors.append("diffs_ok != true: planted-diff counters did not match the expected values")

          if errors:
              print("Performance/correctness regression:")
              for e in errors:
                  print(" -", e)
              sys.exit(1)
          print("Thresholds passed.")
          PY

      - name: Publish results to the step summary
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          p = Path("bench.json")
          if not p.exists():
              raise SystemExit(0)   # the bench failed before writing metrics — nothing to publish
          d = json.loads(p.read_text(encoding="utf-8"))

          def num(x: int) -> str:
              return f"{x:,}".replace(",", " ")

          lines = [
              "## Compare core benchmark",
              "",
              f"Rows per side: **{num(d['n'])}**",
              "",
              "| Metric | Value |",
              "|---|---:|",
              f"| generic (rows/s) | {num(d['generic_rows_per_s'])} |",
              f"| fast-path (rows/s) | {num(d['fastpath_rows_per_s'])} |",
              f"| hash: rows streamed | {num(d['hash_rows_streamed'])} |",
              f"| hash: rows total | {num(d['hash_total_rows'])} |",
              f"| diffs_ok | {d['diffs_ok']} |",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY
