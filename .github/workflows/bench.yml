name: Benchmark

# Бенчмарк-матрица против регрессий производительности (роадмап v0.3).
# Пороги — консервативный пол для CI-раннеров (~2x ниже локальных цифр):
# раннеры GitHub медленнее и шумнее локальной машины.

on:
  pull_request:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .

      - name: Бенчмарк (200K строк на сторону)
        run: python3 bench/bench.py 200000 --json bench.json

      - name: Проверка регрессии
        run: |
          python3 - <<'PY'
          import json
          import sys

          data = json.load(open("bench.json", encoding="utf-8"))

          FASTPATH_MIN = 150_000   # строк/с
          GENERIC_MIN = 100_000    # строк/с

          errors = []
          if data["fastpath_rows_per_s"] < FASTPATH_MIN:
              errors.append(f"fast-path: {data['fastpath_rows_per_s']} < {FASTPATH_MIN} строк/с")
          if data["generic_rows_per_s"] < GENERIC_MIN:
              errors.append(f"generic: {data['generic_rows_per_s']} < {GENERIC_MIN} строк/с")
          if data["diffs_ok"] is not True:
              errors.append("diffs_ok != true: счётчики расхождений не совпали с ожидаемыми")

          if errors:
              print("Регрессия производительности/корректности:")
              for e in errors:
                  print(" -", e)
              sys.exit(1)
          print("Пороги пройдены.")
          PY

      - name: Публикация результатов в step summary
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          p = Path("bench.json")
          if not p.exists():
              raise SystemExit(0)   # бенч упал до записи метрик — публиковать нечего
          d = json.loads(p.read_text(encoding="utf-8"))

          def num(x: int) -> str:
              return f"{x:,}".replace(",", " ")

          lines = [
              "## Бенчмарк ядра сравнения",
              "",
              f"Строк на сторону: **{num(d['n'])}**",
              "",
              "| Метрика | Значение |",
              "|---|---:|",
              f"| generic (строк/с) | {num(d['generic_rows_per_s'])} |",
              f"| fast-path (строк/с) | {num(d['fastpath_rows_per_s'])} |",
              f"| hash: строк потоково | {num(d['hash_rows_streamed'])} |",
              f"| hash: строк всего | {num(d['hash_total_rows'])} |",
              f"| diffs_ok | {d['diffs_ok']} |",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY
