name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,postgres]"
      - run: pytest tests/ -v

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: dbparity
          POSTGRES_DB: dbparity
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,postgres]"
      - run: pytest tests/test_postgres_integration.py -v
        env:
          DBPARITY_PG_DSN: host=127.0.0.1 port=5432 dbname=dbparity user=postgres password=dbparity

  mssql-integration:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "DbParity!Passw0rd"
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # msodbcsql18 + sqlcmd (tools18). GitHub runner quirk: the
      # packages.microsoft.com repository is already configured
      # (microsoft-prod.list) with a different Signed-By — a duplicate entry
      # with another signature makes apt-get update fail with a conflict.
      # Remove the pre-configured list and re-add the repository with an
      # explicit keyring.
      - name: Install msodbcsql18 (ODBC Driver 18)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/microsoft-mssql.gpg
          echo "deb [signed-by=/usr/share/keyrings/microsoft-mssql.gpg] https://packages.microsoft.com/ubuntu/$(lsb_release -rs)/prod $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18 unixodbc-dev
          echo "--- Installed ODBC drivers:"
          odbcinst -q -d
      - run: pip install -e ".[dev,mssql]"
      # The mssql container has no built-in health check — wait for readiness
      # with a timeout loop via sqlcmd and create the working database
      - name: Wait for SQL Server and create database
        run: |
          for i in $(seq 1 60); do
            if /opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1,1433 -U sa -P "DbParity!Passw0rd" -C -Q "SELECT 1" -b >/dev/null 2>&1; then
              echo "SQL Server is up (attempt $i)"
              /opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1,1433 -U sa -P "DbParity!Passw0rd" -C -b \
                -Q "IF DB_ID('dbparity') IS NULL CREATE DATABASE dbparity"
              exit 0
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "attempt $i — last sqlcmd error:"
              /opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1,1433 -U sa -P "DbParity!Passw0rd" -C -Q "SELECT 1" -b 2>&1 | tail -3 || true
            fi
            sleep 2
          done
          echo "SQL Server did not become ready in time; container logs:"
          docker ps -a
          docker logs "$(docker ps -aq --filter ancestor=mcr.microsoft.com/mssql/server:2022-latest | head -1)" 2>&1 | tail -50 || true
          exit 1
      - run: pytest tests/test_mssql_integration.py -v
        env:
          DBPARITY_MSSQL_DSN: "Driver={ODBC Driver 18 for SQL Server};Server=127.0.0.1,1433;Database=dbparity;UID=sa;PWD=DbParity!Passw0rd;TrustServerCertificate=yes"
